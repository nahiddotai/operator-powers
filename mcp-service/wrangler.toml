name = "nahiddotai-superpowers"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Secrets (set with `wrangler secret put`):
#   TOKEN_SECRET - HMAC key for confirmation and deletion tokens (generate: openssl rand -hex 32)

[vars]
WRITES_ENABLED = "true"

[[d1_databases]]
binding = "DB"
database_name = "nahiddotai-superpowers"
database_id = "00000000-0000-4000-8000-000000000001"

[[kv_namespaces]]
binding = "RATE_KV"
id = "00000000000000000000000000000001"
